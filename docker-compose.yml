services: 

  #define db service 
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    
    #persist data of postgres (where data stored in linux container)
    volumes:
      - db_data:/var/lib/postgresql/data 

      #initialize db with sql file (create table)
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis-cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"


  #define app service
  app:
    build: . #build image from dockerfile in curr direct. 
    deploy:
      replicas: 3 #scale app service to 3 instances
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      - db #start db service before app service
      - redis-cache #start redis-cache service before app service

  #define nginx service to distribute traffic to app instances (load balancing)
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes: 
      - ./nginx.conf:/etc/nginx/nginx.conf #mount nginx.config from host 
    depends_on:
      - app #start app service before nginx service


#add volume in hard disk of host machine (where data stored in windows)
volumes:
  db_data: